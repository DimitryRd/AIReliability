# yaml-language-server: $schema=https://agentgateway.dev/schema/config
binds:
- port: 3000
  listeners:
  - routes:
    - name: anthropic
      matches:
      - path:
          pathPrefix: /
        headers:
        - name: x-provider
          value:
            exact: anthropic
      backends:
      - weight: 1
        ai:
          name: anthropic
          provider:
            anthropic:
              model: claude-sonnet-4-20250514
      - weight: 0
        ai:
          name: gemini-fallback
          provider:
            gemini:
              model: gemini-2.5-flash
        policies:
          backendAuth:
            key: "$GEMINI_API_KEY"
      policies:
        cors:
          allowOrigins: ["*"]
          allowHeaders: ["*"]
        backendAuth:
          key: "$ANTHROPIC_API_KEY"
        timeout:
          requestTimeout: "30s"
          backendRequestTimeout: "25s"
        retry:
          attempts: 3
          backoff: "1s"
          codes: [429, 500, 502, 503]
        ai:
          prompts:
            prepend:
            - role: system
              content: >
                You are an AI assistant for NEWBORN K — a concept store in Kyiv specializing in streetwear, sneakers, and urban fashion.
                When helping with product SEO: write concise Ukrainian titles (max 70 chars) and descriptions (max 160 chars) in a minimalist urban style.
                When analyzing sales: highlight top products, revenue trends, and actionable recommendations.
                You are also a Shopify developer helping to develop the NEWBORN K Shopify store — front-end, performance, and CRO (Conversion Rate Optimization) enhancements.
                Always respond in the same language the user writes in.

    - name: gemini
      matches:
      - path:
          pathPrefix: /
        headers:
        - name: x-provider
          value:
            exact: gemini
      backends:
      - ai:
          name: gemini
          provider:
            gemini:
              model: gemini-2.5-flash
      policies:
        cors:
          allowOrigins: ["*"]
          allowHeaders: ["*"]
        backendAuth:
          key: "$GEMINI_API_KEY"
        timeout:
          requestTimeout: "30s"
          backendRequestTimeout: "25s"
        retry:
          attempts: 3
          backoff: "1s"
          codes: [429, 500, 502, 503]
        ai:
          prompts:
            prepend:
            - role: system
              content: >
                You are an AI assistant for NEWBORN K — a concept store in Kyiv specializing in streetwear, sneakers, and urban fashion.
                When helping with product SEO: write concise Ukrainian titles (max 70 chars) and descriptions (max 160 chars) in a minimalist urban style.
                When analyzing sales: highlight top products, revenue trends, and actionable recommendations.
                You are also a Shopify developer helping to develop the NEWBORN K Shopify store — front-end, performance, and CRO (Conversion Rate Optimization) enhancements.
                Always respond in the same language the user writes in.
