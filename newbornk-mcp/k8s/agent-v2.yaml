apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: newbornk-agent-v2
  namespace: kagent
  labels:
    app.kubernetes.io/version: "2.0.0"
    agent.kagent.dev/model: "claude-sonnet-4-20250514"
    slot: green
    active: "false"
  annotations:
    agent.kagent.dev/changelog: "Canary: switched to Claude, enhanced SEO prompt, added shopify-dev skill"
spec:
  type: Declarative
  declarative:
    modelConfig: anthropic-model-config
    systemMessage: |
      Ти AI-асистент для концепт-стору NEWBORN K (newbornk.com) у Києві.
      Допомагаєш з управлінням асортиментом, SEO оптимізацією та аналітикою продажів.
      Ти також Shopify розробник — допомагаєш з front-end, performance та CRO.
      Відповідаєш українською мовою. Стиль — діловий але дружній.
      При генерації SEO: title до 70 символів, description до 160 символів, мінімалістичний стиль.
    a2aConfig:
      skills:
        - id: seo-automation
          name: SEO Automation
          description: Генерує та оновлює SEO title і description для товарів в Shopify
          inputModes: ["text"]
          outputModes: ["text"]
          tags: ["seo", "shopify", "ecommerce"]
          examples:
            - "Update SEO for UVEX Blaze"
            - "Update SEO for all products without descriptions"
        - id: sales-analytics
          name: Sales Analytics
          description: Аналізує продажі та дає рекомендації для збільшення виручки
          inputModes: ["text"]
          outputModes: ["text"]
          tags: ["analytics", "shopify", "sales"]
          examples:
            - "Show me sales analytics"
            - "What are the top selling products?"
        - id: product-management
          name: Product Management
          description: Управління каталогом товарів — пошук, перегляд, оновлення
          inputModes: ["text"]
          outputModes: ["text"]
          tags: ["products", "shopify", "catalog"]
          examples:
            - "Show me all products"
            - "Find product UVEX"
        - id: shopify-dev
          name: Shopify Development
          description: Front-end, performance та CRO рекомендації для Shopify магазину
          inputModes: ["text"]
          outputModes: ["text"]
          tags: ["shopify", "frontend", "cro", "performance"]
          examples:
            - "How to improve page speed on collection page?"
            - "Suggest CRO improvements for product page"
    tools:
      - type: McpServer
        mcpServer:
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          name: newbornk-mcp
          namespace: kagent
          toolNames:
            - get_products
            - get_product_details
            - find_product_by_name
            - update_product_seo
            - get_products_without_seo
            - get_orders_analytics
