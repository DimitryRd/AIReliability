apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentgateway.fullname" . }}-config
  labels:
    {{- include "agentgateway.labels" . | nindent 4 }}
data:
  config.yaml: |
    # yaml-language-server: $schema=https://agentgateway.dev/schema/config
    binds:
    - port: 3000
      listeners:
      - routes:
        - name: anthropic
          backends:
          - ai:
              name: anthropic
              provider:
                anthropic:
                  model: claude-sonnet-4-20250514
          policies:
            cors:
              allowOrigins: ["*"]
              allowHeaders: ["*"]
            backendAuth:
              key: "$ANTHROPIC_API_KEY"
