apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: devops-agent
  namespace: kagent
spec:
  type: Declarative
  declarative:
    modelConfig: anthropic-model-config
    systemMessage: |
      You are a helpful DevOps and Kubernetes assistant.
      You help with infrastructure management, debugging, and automation.
    tools:
      - type: McpServer
        mcpServer:
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          name: kagent-tool-server
          namespace: kagent
          toolNames:
            - k8s_get_resources
            - k8s_get_pod_logs
            - k8s_describe_resource
            - k8s_get_events
            - k8s_apply_manifest
            - k8s_delete_resource
