apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: phoenix
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://registry-1.docker.io/arizephoenix
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: phoenix
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: phoenix-helm
      version: "5.0.23"
      sourceRef:
        kind: HelmRepository
        name: phoenix
        namespace: flux-system
  values:
    postgresql:
      enabled: true
