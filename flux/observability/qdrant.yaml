apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: qdrant
  namespace: flux-system
spec:
  interval: 1h
  url: https://qdrant.github.io/qdrant-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: qdrant
      version: "1.17.1"
      sourceRef:
        kind: HelmRepository
        name: qdrant
        namespace: flux-system
  values:
    replicaCount: 1
    service:
      type: ClusterIP
